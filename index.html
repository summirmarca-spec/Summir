<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<img src="logo.png" style="width:200px;">
  
  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #0a0a0a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: black;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #000, #111);
      text-align: center;
    }

    .hero h1 {
      font-size: 60px;
      margin: 0;
    }

    .hero p {
      color: #aaa;
      margin-top: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ccc;
    }

    .products {
      padding: 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 30px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: #777;
    }
  </style>
</head>
<body>

<img src="logo.png" style="width:200px;">

<section class="hero">
  <h1>SUMMIR</h1>
  <p>Streetwear exclusivo</p>
  <a href="https://wa.me/" target="_blank">
    <button class="btn">Comprar</button>
  </a>
</section>

<section class="products">
  <div class="card">
    <img src="https://via.placeholder.com/300x300">
    <h3>Buzo Oversize</h3>
    <p>S/120</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x300">
    <h3>Pantalón Street</h3>
    <p>S/100</p>
  </div>
</section>

<footer>
  © 2026 Summir
</footer>

</body>
</html>
