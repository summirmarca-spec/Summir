<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Marca Streetwear</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f0f0f;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: black;
      font-size: 24px;
      letter-spacing: 2px;
    }

    .hero {
      height: 80vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      background: linear-gradient(to bottom, #000, #222);
    }

    .hero h1 {
      font-size: 48px;
      margin: 0;
    }

    .hero p {
      margin-top: 10px;
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .products {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  MI MARCA
</header>

<section class="hero">
  <h1>DROP 001</h1>
  <p>Streetwear exclusivo</p>
  <button class="btn">Comprar ahora</button>
</section>

<section class="products">
  <div class="card">
    <img src="https://via.placeholder.com/300x300" alt="Buzo">
    <h3>Buzo Oversize</h3>
    <p>S/120</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x300" alt="Pantalón">
    <h3>Pantalón Street</h3>
    <p>S/100</p>
  </div>
</section>

<footer>
  © 2026 Mi Marca - Todos los derechos reservados
</footer>

</body>
</html>
